name: Weather forecast to Tailscale

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  send-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.TAILSCALE_AUTHKEY }}" ]; then
            echo "Error: TAILSCALE_AUTHKEY secret is not set."
            exit 1
          fi
          if [ -z "${{ secrets.TAILSCALE_DEST_URL }}" ]; then
            echo "Error: TAILSCALE_DEST_URL secret is not set."
            exit 1
          fi

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Authenticate with Tailscale
        run: |
          sudo tailscale up --authkey "${{ secrets.TAILSCALE_AUTHKEY }}" --hostname github-actions-weather

      - name: Fetch forecast for Sakarya Kocaali
        run: |
          curl -fsSL "https://wttr.in/Sakarya?format=j1" -o forecast.json
          cat forecast.json

      - name: Send forecast to Tailscale destination
        env:
          DEST_URL: ${{ secrets.TAILSCALE_DEST_URL }}
        run: |
          if [ -z "$DEST_URL" ]; then
            echo "Error: TAILSCALE_DEST_URL secret is not set."
            exit 1
          fi

          curl -fsSL -X POST "$DEST_URL" \
            -H 'Content-Type: application/json' \
            --data-binary @forecast.json

      - name: Shutdown Tailscale
        if: always()
        run: |
          sudo tailscale down || true
